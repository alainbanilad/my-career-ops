# Career-Ops Profile Configuration
# Copy this file to config/profile.yml and fill in your details.
# This is the single source of truth for your personal data across all modes.

candidate:
  full_name: "Jane Smith"
  email: "jane@example.com"
  phone: "+1-555-0123"
  location: "San Francisco, CA"
  linkedin: "linkedin.com/in/janesmith"
  portfolio_url: "https://janesmith.dev"
  github: "github.com/janesmith"
  twitter: "https://x.com/janesmith"
  # (Optional) Canva resume design ID for visual CV generation via /career-ops pdf.
  # Find it in your Canva design URL: https://www.canva.com/design/DAxxxxxxx/...
  # The ID starts with "D" and is 11 characters long.
  # canva_resume_design_id: "DAxxxxxxxxx"

target_roles:
  # Your North Star roles — what you're optimizing for
  primary:
    - "Senior AI Engineer"
    - "Staff ML Engineer"
  # Archetypes help the evaluation system score fit
  archetypes:
    - name: "AI/ML Engineer"
      level: "Senior/Staff"
      fit: "primary"        # primary = dream role, secondary = good fit, adjacent = stretch
    - name: "AI Product Manager"
      level: "Senior"
      fit: "secondary"
    - name: "Solutions Architect"
      level: "Mid-Senior"
      fit: "adjacent"

narrative:
  # Your professional headline (1 line)
  headline: "ML Engineer turned AI product builder"
  # Your exit story — what makes you unique
  exit_story: "Built and sold my SaaS after 5 years. Now focused on applied AI at scale."
  # Your top 3-5 superpowers
  superpowers:
    - "End-to-end ML pipelines"
    - "Fast prototyping (idea to prod in 2 weeks)"
    - "Cross-functional communication"
  # Proof points — projects, articles, case studies with measurable impact
  proof_points:
    - name: "Project Alpha"
      url: "https://janesmith.dev/project-alpha"
      hero_metric: "Reduced inference latency 40%"
    - name: "Open Source Tool"
      url: "https://github.com/janesmith/tool"
      hero_metric: "2K+ GitHub stars"
  # Optional: dashboard/demo URL with credentials
  # dashboard:
  #   url: "https://janesmith.dev/demo"
  #   password: "demo-2026"

compensation:
  target_range: "$150K-200K"     # Your target total comp
  currency: "USD"
  minimum: "$120K"               # Walk-away number
  location_flexibility: "Remote preferred, 1 week/month on-site possible"

location:
  country: "United States"
  city: "San Francisco"
  timezone: "PST"
  visa_status: "No sponsorship needed"
  # For remote roles outside your country:
  # onsite_availability: "1 week/month in any city"

automation:
  # Global automation settings
  enabled: false                              # Set to true to enable daily automation
  timezone: "Asia/Singapore"                  # Timezone for schedule times (IANA format)
  concurrent_runs_allowed: false              # Prevent overlapping cycles (recommended: false)

  # Per-backend scheduler configuration
  schedulers:
    # Backend A: System Scheduler (cron on Linux/Mac, Task Scheduler on Windows)
    system:
      enabled: false                          # Set to true to use system scheduler
      timezone: "Asia/Singapore"
      schedule:
        - time: "09:00"                       # 9 AM SGT
        - time: "18:00"                       # 6 PM SGT (18:00 in 24-hour format)

    # Backend B: GitHub Actions Workflow Dispatcher
    github_actions:
      enabled: false                          # Set to true to use GitHub Actions
      personal_access_token: ""               # GitHub PAT with workflow scope (see quickstart.md)
      repository: ""                          # Format: owner/repo (e.g., santifer/career-ops)
      workflow_file: ".github/workflows/auto-job-scan-apply.yml"
      concurrency_group: "auto-scan-apply"    # Prevent concurrent runs

    # Backend C: Node.js Daemon (express server with node-schedule)
    nodejs:
      enabled: false                          # Set to true to run local daemon
      port: 3000
      host: "localhost"
      # Schedule times (node-schedule format: HH:MM in 24-hour format)
      schedule:
        - "0 9 * * *"                         # 9 AM SGT every day
        - "0 18 * * *"                        # 6 PM SGT every day

    # Backend D: External Scheduler (webhook endpoint)
    external:
      enabled: false                          # Set to true to accept external triggers
      webhook_path: "/automation/trigger"     # HTTP endpoint (e.g., POST /automation/trigger)
      webhook_secret: ""                      # Shared secret for HMAC validation (generate via: openssl rand -hex 32)
      rate_limit_per_hour: 10                 # Max triggers per hour

  # Notification channels (all optional)
  notifications:
    # Channel A: Console (always enabled, logs to terminal)
    console:
      enabled: true                           # Recommend: always true (logs to terminal)

    # Channel C: Slack Webhook
    slack:
      enabled: false                          # Set to true to send Slack notifications
      webhook_url: ""                         # Get from Slack workspace admin (see quickstart.md)
      mentions: "@here"                       # Optional: mention user or group (e.g., @yourname)
      thread_replies: true                    # Group related messages in thread

    # Channel D: Obsidian Daily Log
    obsidian:
      enabled: false                          # Set to true to log sessions to Obsidian
      vault_path: ""                          # Path to Obsidian vault (e.g., D:\AI_BRAIN\Claude-Obsidian\claude-obsidian)
      session_folder: "Career-Ops/Sessions"   # Folder within vault for session logs
      daily_digest: false                     # Optional: append to monthly digest file
